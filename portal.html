  <link rel="manifest" href="/portal-manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <meta name="theme-color" content="#0f172a" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      overscroll-behavior-y: none;
      -webkit-text-size-adjust: 100%;
    }
    html { height: -webkit-fill-available; }

    /* Prevent iOS auto-zoom on input focus (requires 16px) */
    input, select, textarea { font-size: 16px !important; }

    /* Fast, clean taps on all buttons */
    button, a { touch-action: manipulation; -webkit-appearance: none; user-select: none; -webkit-user-select: none; }

    /* All pages clear the fixed bottom nav + iPhone home bar */
    .cp-page { padding-bottom: calc(88px + env(safe-area-inset-bottom, 0px)) !important; }

    /* Hero top padding accounts for iPhone status bar in PWA standalone mode */
    .cp-hero-top { padding-top: calc(env(safe-area-inset-top, 0px) + 20px) !important; }

    /* Card press effect */
    .cp-card-tap:active { transform: scale(0.985); box-shadow: 0 1px 6px rgba(0,0,0,.08); }

    /* Smooth iOS scrolling in scroll containers */
    .rfkc-scroll { -webkit-overflow-scrolling: touch; }
  </style>
